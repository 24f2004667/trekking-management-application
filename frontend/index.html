<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafarNama</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { background:#f4f6f8; }
  .navbar-brand i { color:#0f766e; }
  .sidebar { min-height: calc(100vh - 56px); background:#0f766e; }
  .sidebar a { color:#e6fffa; display:block; padding:.65rem 1rem; border-radius:.4rem; text-decoration:none; margin:3px; }
  .sidebar a.active, .sidebar a:hover { background:rgba(255,255,255,.15); color:#fff; }
  .stat-card { border:0; border-radius:8px; box-shadow:0 2px 10px rgba(0,0,0,.06); }
  .brand-color { color:#0f766e; }
  .btn-brand { background:#0f766e; border-color:#0f766e; color:#fff; }
  .btn-brand:hover { background:#0b5c56; border-color:#0b5c56; color:#fff; }
  .badge-open { background:#16a34a; }
  .badge-closed { background:#6b7280; }
  .badge-completed { background:#2563eb; }
  .badge-cancelled { background:#dc2626; }
  .badge-booked { background:#0f766e; }
  .auth-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; background:#0f766e; }
  .trek-card:hover {box-shadow:0 2px 8px rgba(0,0,0,.1);}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios@1.7.2/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
